<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedactionAI - Australian Privacy Compliance</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; color: #333; display: flex; justify-content: center; padding: 50px; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 800px; }
        h1 { margin-top: 0; color: #2d3748; }

        .options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; background: #edf2f7; padding: 15px; border-radius: 8px; }
        .checkbox-item { display: flex; align-items: center; font-size: 14px; color: #4a5568; font-weight: 500; }
        .checkbox-item input { margin-right: 8px; accent-color: #4299e1; cursor: pointer; transform: scale(1.1); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        textarea { width: 100%; height: 200px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; resize: none; box-sizing: border-box; }
        textarea:focus { outline: 2px solid #4299e1; border-color: transparent; }

        /* Updated Button Styling to look clickable */
        .btn-submit { background-color: #4299e1; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background 0.2s; width: 100%; font-size: 16px; }
        .btn-submit:hover { background-color: #3182ce; }

        /* Subscribe button specific style */
        .btn-subscribe { background-color: #38b2ac; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-subscribe:hover { background-color: #319795; }

        .output { background-color: #f7fafc; border: 1px solid #e2e8f0; color: #2d3748; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9em; color: #718096; }

        .api-key-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
        .api-input { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>RedactionAI Demo</h1>

    <div style="background: #e6fffa; border: 1px solid #38b2ac; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
        <span style="color: #234e52; font-weight: 600;">Need to process more documents? Get the Pro API.</span>
        <a href="https://buy.stripe.com/14AcMYci9bZiexua8mak001" target="_blank" style="text-decoration: none;">
            <button type="button" class="btn-subscribe">Subscribe ($9/mo)</button>
        </a>
    </div>

    <form action="/redact" method="post">

        <label>Select entities to redact:</label>
        <div class="options-grid">
            <label class="checkbox-item"><input type="checkbox" name="entities" value="PERSON" checked> Names (Person)</label>
            <label class="checkbox-item"><input type="checkbox" name="entities" value="EMAIL" checked> Emails</label>
            <label class="checkbox-item"><input type="checkbox" name="entities" value="PHONE" checked> Phone Numbers</label>

            <label class="checkbox-item"><input type="checkbox" name="entities" value="MEDICARE" checked> 🇦🇺 Medicare</label>
            <label class="checkbox-item"><input type="checkbox" name="entities" value="TFN" checked> 🇦🇺 TFN</label>
            <label class="checkbox-item"><input type="checkbox" name="entities" value="LICENSE" checked> 🇦🇺 Driver License</label>

            <label class="checkbox-item"><input type="checkbox" name="entities" value="DOB" checked> Dates of Birth</label>
            <label class="checkbox-item"><input type="checkbox" name="entities" value="LOCATION" checked> Locations</label>
        </div>

        <div class="grid">
            <div>
                <label>Original Text</label>
                <textarea name="user_text" placeholder="Paste your text here..." required>{{ original_text }}</textarea>
            </div>

            <div>
                <label>Redacted Result</label>
                <textarea class="output" readonly>{{ result_text }}</textarea>
            </div>
        </div>

        <div class="api-key-section">
            <label>Pro API Key (Optional)</label>
            <input type="text" name="api_key" class="api-input" placeholder="Paste key here if you have one (e.g. pro_key_123)">

            <button type="submit" class="btn-submit">Redact Now</button>
        </div>

    </form>
    </div>

</body>
</html>
